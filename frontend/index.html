<!DOCTYPE html>
<html lang="en">
<head>
    <title>Weather & Wardrobe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="search">
            <input type="text" placeholder="Enter city name" spellcheck="false">
            <button>Search</button>
        </div>
        <div class="weather">
            <h1 class="temp">--°c</h1>
            <h2 class="city">Search a City</h2>
            <div class="details">
                <p class="humidity">Humidity: --%</p>
                <p class="wind">Wind: -- km/h</p>
            </div>
            <div class="wardrobe">
                <h3>Suggestion:</h3>
                <p class="advice">Enter a city to get outfit advice!</p>
            </div>
        </div>
    </div>
</body>
</html>
